<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:ital,wght@0,400;0,500;1,400&family=DM+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="pulse-foundation.css">
<title>Pulse. — Sequence Step Editor Drawer</title>
<style>body{background:#1a0d2e;}.demo-bg{display:flex;justify-content:flex-end;min-height:100vh;padding-top:56px;}</style>
</head><body><div class="orb orb-pink"></div><div class="orb orb-cyan"></div>
<header class="topbar"><a href="#" class="logo">Pulse<span style="background:var(--gr);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">.</span></a><div class="topbar-right"><span class="plan-badge pro-light">Pro Light</span><div class="avatar">CL</div></div></header>
<div class="demo-bg">
<div class="drawer open" style="transform:none;position:relative;top:auto;right:auto;bottom:auto;width:520px;max-width:100%;height:calc(100vh - 56px);">
  <div class="drawer-header">
    <div><div class="drawer-title">Sequence — Agency founders Q1</div><div style="font-size:11px;color:var(--td);">2 steps · Nothing sends without your approval</div></div>
    <button class="drawer-close" style="margin-left:auto;">✕</button>
  </div>
  <div class="drawer-body" style="display:flex;flex-direction:column;gap:0;">

    <!-- Step 1 -->
    <div style="display:flex;gap:12px;margin-bottom:4px;">
      <div style="display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0;">
        <div style="width:28px;height:28px;border-radius:50%;background:rgba(255,20,147,0.15);border:1px solid rgba(255,20,147,0.35);color:var(--pink);display:flex;align-items:center;justify-content:center;font-family:var(--of);font-size:11px;font-weight:700;">1</div>
        <div style="width:1px;background:var(--b2);flex:1;margin:3px 0;min-height:16px;"></div>
      </div>
      <div style="flex:1;padding-bottom:12px;">
        <div style="background:var(--s);border:1px solid var(--b2);border-radius:10px;overflow:hidden;">
          <div style="padding:10px 12px;display:flex;align-items:center;gap:6px;">
            <span class="badge badge-pink" style="font-size:10px;">Value drop</span>
            <span class="badge badge-cyan" style="font-size:10px;">Calm &amp; Commercial</span>
            <span style="font-size:10px;color:var(--td);margin-left:auto;">Send immediately</span>
          </div>
          <div style="padding:10px 12px;border-top:1px solid var(--b);display:flex;flex-direction:column;gap:8px;">
            <div><label class="input-label">Subject</label><input class="input" style="font-size:12px;" value="Something I thought you'd find useful…"></div>
            <div><label class="input-label">Message</label><textarea class="input" style="font-size:12px;min-height:80px;">Hi [first_name], I came across [company]'s recent work and thought this might be relevant…</textarea></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Step 2 -->
    <div style="display:flex;gap:12px;">
      <div style="display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0;">
        <div style="width:28px;height:28px;border-radius:50%;background:var(--s2);border:1px solid var(--b2);color:var(--tm);display:flex;align-items:center;justify-content:center;font-family:var(--of);font-size:11px;font-weight:700;">2</div>
      </div>
      <div style="flex:1;padding-bottom:12px;">
        <div style="background:var(--s);border:1px solid var(--b2);border-radius:10px;overflow:hidden;">
          <div style="padding:10px 12px;display:flex;align-items:center;gap:6px;">
            <span class="badge badge-neutral" style="font-size:10px;">Follow-up</span>
            <span class="badge badge-neutral" style="font-size:10px;">Light Touch Relational</span>
            <span style="font-size:10px;color:var(--td);margin-left:auto;">After 5 days · no reply</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Add step -->
    <button style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tm);border:1px dashed var(--b2);border-radius:8px;padding:8px 12px;background:transparent;cursor:pointer;font-family:var(--of);width:100%;margin-left:40px;width:calc(100% - 40px);">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Add follow-up step
    </button>

    <div class="notice notice-amber" style="margin-top:16px;font-size:12px;">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="flex-shrink:0;"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M7 4.5v3.5l2 1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Follow-ups stop automatically if the prospect replies at any point.
    </div>
  </div>
  <div class="drawer-footer">
    <button class="btn btn-ghost btn-sm">Cancel</button>
    <button class="btn btn-primary btn-sm">Save sequence</button>
  </div>
</div>
</div></body></html>
