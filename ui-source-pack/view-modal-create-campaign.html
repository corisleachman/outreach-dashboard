<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:ital,wght@0,400;0,500;1,400&family=DM+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="pulse-foundation.css">
<title>Pulse. — Create Campaign Modal</title>
<style>body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:rgba(13,9,20,0.98);}</style>
</head><body><div class="orb orb-pink"></div><div class="orb orb-cyan"></div>
<div class="modal-box" style="position:relative;">
  <div class="modal-title">New campaign</div>
  <div class="field"><label class="input-label">Campaign name</label><input class="input" placeholder="e.g. Agency founders — Q2" autofocus></div>
  <div class="field"><label class="input-label">Connected account</label>
    <div style="display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--s2);border:1px solid var(--b2);border-radius:9px;">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M1 5l7 4.5L15 5" stroke="currentColor" stroke-width="1.3"/></svg>
      <span style="font-size:13px;color:var(--t);">coris@example.com</span>
      <span class="badge badge-green" style="margin-left:auto;">Connected</span>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost">Cancel</button>
    <button class="btn btn-primary">Create campaign →</button>
  </div>
</div></body></html>
