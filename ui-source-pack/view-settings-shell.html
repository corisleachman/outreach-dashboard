<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:ital,wght@0,400;0,500;1,400&family=DM+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="pulse-foundation.css">
<title>Pulse. — Settings Shell</title>
<style>
.settings-layout{display:flex;gap:0;min-height:calc(100vh - 56px);padding-top:56px;margin-left:var(--sw);}
.settings-nav{width:200px;flex-shrink:0;border-right:1px solid var(--b);padding:24px 0;}
.settings-nav-item{padding:8px 20px;font-family:var(--of);font-size:13px;font-weight:600;color:var(--tm);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:8px;border-left:2px solid transparent;}
.settings-nav-item:hover{color:var(--t);}
.settings-nav-item.active{color:var(--pink);border-left-color:var(--pink);background:var(--pd);}
.settings-content{flex:1;padding:32px;max-width:640px;}
.settings-section{margin-bottom:32px;}
.settings-section-title{font-family:var(--of);font-size:16px;font-weight:800;margin-bottom:16px;}
</style>
</head><body><div class="orb orb-pink"></div><div class="orb orb-cyan"></div><header class="topbar"><a href="#" class="logo">Pulse<span style="background:var(--gr);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">.</span></a><nav class="breadcrumb"><span class="breadcrumb-sep">·</span><span class="breadcrumb-current">Settings</span></nav><div class="topbar-right"><span class="plan-badge pro-light">Pro Light</span><div class="avatar">CL</div></div></header><aside class="sidebar">
  <a href="#" class="si" title="Today"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><rect x="1" y="3" width="14" height="12" rx="2"/><path d="M1 7h14M5 1v4M11 1v4"/></svg></a>
  <a href="#" class="si" title="Campaigns"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="1" y="1" width="6" height="6" rx="1.2"/><rect x="9" y="1" width="6" height="6" rx="1.2"/><rect x="1" y="9" width="6" height="6" rx="1.2"/><rect x="9" y="9" width="6" height="6" rx="1.2"/></svg></a>
  <a href="#" class="si active si-bottom" title="Settings"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.42 1.42M11.53 11.53l1.42 1.42M3.05 12.95l1.42-1.42M11.53 4.47l1.42-1.42"/></svg></a>
</aside>
<div class="settings-layout">
  <nav class="settings-nav">
    <div class="settings-nav-item active">Profile</div>
    <div class="settings-nav-item">Connected accounts</div>
    <div class="settings-nav-item">Personality packs</div>
    <div class="settings-nav-item">Notifications</div>
    <div class="settings-nav-item">Appearance</div>
    <div class="settings-nav-item">Plan &amp; billing</div>
    <div class="settings-nav-item">Referrals</div>
  </nav>
  <main class="settings-content">
    <div class="settings-section">
      <div class="settings-section-title">Profile</div>
      <div class="field"><label class="input-label">Full name</label><input class="input" value="Coris Leachman"></div>
      <div class="field"><label class="input-label">Email address</label>
        <div style="display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--s);border:1px solid var(--b2);border-radius:9px;opacity:0.6;">
          <span style="font-size:13px;color:var(--tm);">coris@example.com</span>
          <span style="font-size:11px;color:var(--td);margin-left:auto;">Set by Gmail · Read only</span>
        </div>
      </div>
      <button class="btn btn-ghost">Save changes</button>
    </div>
  </main>
</div></body></html>
